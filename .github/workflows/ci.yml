name: CI

on: [push, pull_request]

jobs:
  test5:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v2
      - name: Use Node.js
        uses: actions/setup-node@v2
        with:
          node-version: 20
      - name: npm install
        run: npm install
      - name: npm build
        run: npm run build
      - name: npm test5
        uses: GabrielBB/xvfb-action@v1
        with:
          run: npm run test5
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
